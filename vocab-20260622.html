<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語フラッシュカード</title>
<style>
:root{
  --bg:#f5f3ef;--card:#fff;--ink:#1e1e1e;
  --accent:#4a6fa5;--aclt:#c8d8f0;
  --green:#3d7a55;--red:#a83232;--muted:#7a7972;--tag:#e8f0fb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Yu Gothic",-apple-system,sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:22px 16px 60px}
h1{font-size:18px;font-weight:800;margin:4px 0 16px;display:flex;align-items:center;gap:8px}
.badge{font-size:11px;color:var(--accent);background:var(--tag);padding:3px 10px;border-radius:20px;font-weight:700}
.tabs{display:flex;background:var(--card);padding:4px;border-radius:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:18px;gap:4px}
.tab{border:none;background:transparent;padding:9px 20px;font-size:13.5px;
  font-weight:700;color:var(--muted);border-radius:9px;cursor:pointer;transition:all .2s}
.tab.active{background:var(--accent);color:#fff}
.view{width:100%;max-width:440px;display:none}
.view.active{display:block}

/* ---- Card ---- */
.auto-row{display:flex;align-items:center;justify-content:center;
  gap:6px;font-size:12px;color:var(--muted);margin-bottom:10px}
.auto-row input{accent-color:var(--accent)}
.prog{text-align:center;font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:600}
.card-wrap{perspective:1200px;width:100%;height:255px;margin-bottom:14px;cursor:pointer}
.card{position:relative;width:100%;height:100%;
  transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1)}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:22px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.1)}
.front{background:var(--card);border:1px solid #ddd9d0}
.back{background:var(--accent);color:#fff;transform:rotateY(180deg)}
.spk{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;
  border:none;background:rgba(0,0,0,.07);color:var(--accent);font-size:15px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.back .spk{background:rgba(255,255,255,.22);color:#fff}
.spk.on{animation:pulse .6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.ptag{font-size:11px;background:var(--tag);color:var(--accent);
  padding:3px 10px;border-radius:20px;margin-bottom:10px;font-weight:600}
.back .ptag{background:rgba(255,255,255,.2);color:#fff}
.word-big{font-size:26px;font-weight:800;letter-spacing:-.01em}
.meaning-big{font-size:20px;font-weight:800;margin-bottom:9px}
.ex-text{font-size:13px;opacity:.94;line-height:1.65;margin-bottom:5px}
.tr-text{font-size:12px;opacity:.78;line-height:1.55}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px}
.nav-row{display:flex;gap:10px;margin-bottom:10px}
.nbtn{flex:1;padding:13px 0;border-radius:12px;border:none;font-size:14px;
  font-weight:700;cursor:pointer;background:var(--card);color:var(--ink);
  box-shadow:0 1px 3px rgba(0,0,0,.08)}
.nbtn.p{background:var(--accent);color:#fff}
.sbtn{width:100%;padding:10px 0;border-radius:12px;border:1px solid var(--aclt);
  background:transparent;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer}

/* ---- Quiz ---- */
.qcard{background:var(--card);border-radius:16px;padding:20px;
  box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:12px}
.qprog{font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:600}
.qmean{font-size:13px;font-weight:700;color:var(--accent);background:var(--tag);
  padding:6px 12px;border-radius:10px;margin-bottom:10px}
.qsent{font-size:15px;line-height:1.8;margin-bottom:13px}
.blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--accent);
  font-weight:700;color:var(--accent);text-align:center}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.obtn{padding:11px 6px;border-radius:10px;border:1.5px solid #ddd9d0;
  background:#fffdfa;font-size:13px;cursor:pointer;color:var(--ink);font-family:inherit}
.obtn.ok{background:var(--green);border-color:var(--green);color:#fff}
.obtn.ng{background:var(--red);border-color:var(--red);color:#fff}
.obtn:disabled{cursor:default}
.fb{margin-top:11px;font-size:13px;font-weight:700;min-height:18px}
.fb.ok{color:var(--green)}.fb.ng{color:var(--red)}
.qtr{font-size:12px;color:var(--muted);margin-top:6px}
.qspk{margin-top:9px;padding:7px 14px;border-radius:10px;border:none;
  background:var(--aclt);color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;display:none}
.score-box{text-align:center;background:var(--card);border-radius:18px;
  padding:34px 20px;box-shadow:0 4px 18px rgba(0,0,0,.08)}
.score-big{font-size:50px;font-weight:900;color:var(--accent);
  letter-spacing:-.02em;margin:10px 0}
.rbtn{margin-top:20px;padding:12px 30px;border-radius:12px;border:none;
  background:var(--accent);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
</style>
</head>
<body>

<h1>📘 英単語カード <span class="badge">10語</span></h1>

<div class="tabs">
  <button class="tab active" data-view="flash">カード学習</button>
  <button class="tab" data-view="quiz">穴埋めテスト</button>
</div>

<!-- FLASH -->
<div class="view active" id="flashView">
  <label class="auto-row">
    <input type="checkbox" id="autoSpeak"> 自動発音
  </label>
  <div class="prog" id="prog">1 / 10</div>
  <div class="card-wrap">
    <div class="card" id="card">
      <div class="face front">
        <button class="spk" id="spkF">🔊</button>
        <div class="ptag" id="fPos"></div>
        <div class="word-big" id="fWord"></div>
      </div>
      <div class="face back">
        <button class="spk" id="spkB">🔊</button>
        <div class="ptag" id="bPos"></div>
        <div class="meaning-big" id="bMean"></div>
        <div class="ex-text" id="bEx"></div>
        <div class="tr-text" id="bTr"></div>
      </div>
    </div>
  </div>
  <div class="hint">タップして意味を表示 / 🔊で発音</div>
  <div class="nav-row">
    <button class="nbtn" id="prevBtn">← 前へ</button>
    <button class="nbtn p" id="nextBtn">次へ →</button>
  </div>
  <button class="sbtn" id="shuffleBtn">🔀 シャッフル</button>
</div>

<!-- QUIZ -->
<div class="view" id="quizView">
  <div class="qcard" id="qcard">
    <div class="qprog" id="qprog"></div>
    <div class="qmean" id="qmean"></div>
    <div class="qsent" id="qsent"></div>
    <div class="opts"  id="opts"></div>
    <div class="fb"    id="fb"></div>
    <button class="qspk" id="qspk">🔊 発音を聞く</button>
  </div>
  <button class="nbtn p" id="qnext" style="width:100%;display:none">次の問題 →</button>
  <div class="score-box" id="scoreBox" style="display:none">
    <div style="font-size:15px;color:var(--muted)">テスト結果</div>
    <div class="score-big" id="scoreNum"></div>
    <div style="font-size:13px;color:var(--muted)" id="scoreCmt"></div>
    <button class="rbtn" id="restartBtn">もう一度挑戦</button>
  </div>
</div>

<script>
const V = [
  {
    word:"curtail", pos:"動詞", meaning:"削減する、短縮する",
    ex:"The government decided to curtail public spending.",
    tr:"政府は公共支出を削減することを決めた。"
  },
  {
    word:"demise", pos:"名詞", meaning:"終焉、死去",
    ex:"Many newspapers predicted the demise of printed books.",
    tr:"多くの新聞は紙の本の終焉を予測した。"
  },
  {
    word:"upheaval", pos:"名詞", meaning:"激変、大動乱",
    ex:"The country experienced political upheaval.",
    tr:"その国は政治的混乱を経験した。"
  },
  {
    word:"debilitating", pos:"形容詞", meaning:"衰弱させる",
    ex:"Rheumatoid arthritis can be a debilitating disease.",
    tr:"関節リウマチは生活を弱らせる病気になり得る。"
  },
  {
    word:"connotation", pos:"名詞", meaning:"含み、言外の意味",
    ex:"The word has a negative connotation.",
    tr:"その単語には否定的なニュアンスがある。"
  },
  {
    word:"solace", pos:"名詞", meaning:"慰め",
    ex:"She found solace in music.",
    tr:"彼女は音楽に慰めを見つけた。"
  },
  {
    word:"remnant", pos:"名詞", meaning:"面影、残りかす",
    ex:"Only a small remnant of the forest remains.",
    tr:"森はほんの一部しか残っていない。"
  },
  {
    word:"resurrection", pos:"名詞", meaning:"復活",
    ex:"The company's resurrection surprised investors.",
    tr:"その会社の復活は投資家を驚かせた。"
  },
  {
    word:"inadvertent", pos:"形容詞", meaning:"不注意な、故意でない",
    ex:"It was an inadvertent mistake.",
    tr:"それはうっかりしたミスだった。"
  },
  {
    word:"impede", pos:"動詞", meaning:"邪魔する、遅らせる",
    ex:"Heavy rain impeded rescue efforts.",
    tr:"大雨は救助活動を妨げた。"
  },
];

/* ===== Speech ===== */
let voices=[];
function loadV(){if(window.speechSynthesis)voices=window.speechSynthesis.getVoices();}
if('speechSynthesis'in window){loadV();window.speechSynthesis.onvoiceschanged=loadV;}
function speak(text,btn){
  if(!('speechSynthesis'in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.88;
  const v=voices.find(v=>v.lang==='en-US')||voices.find(v=>v.lang?.startsWith('en'));
  if(v)u.voice=v;
  if(btn){btn.classList.add('on');u.onend=u.onerror=()=>btn.classList.remove('on');}
  window.speechSynthesis.speak(u);
}

/* ===== Flashcard ===== */
let order=V.map((_,i)=>i),idx=0;
const cardEl=document.getElementById('card');

function renderCard(){
  const it=V[order[idx]];
  cardEl.classList.remove('flipped');
  document.getElementById('fPos').textContent=it.pos;
  document.getElementById('fWord').textContent=it.word;
  document.getElementById('bPos').textContent=it.pos;
  document.getElementById('bMean').textContent=it.meaning;
  document.getElementById('bEx').textContent=it.ex;
  document.getElementById('bTr').textContent=it.tr;
  document.getElementById('prog').textContent=`${idx+1} / ${V.length}`;
  if(document.getElementById('autoSpeak').checked)
    speak(it.word,document.getElementById('spkF'));
}

cardEl.addEventListener('click',e=>{
  if(!e.target.closest('.spk'))cardEl.classList.toggle('flipped');
});
document.getElementById('spkF').addEventListener('click',e=>{
  e.stopPropagation();speak(V[order[idx]].word,e.currentTarget);
});
document.getElementById('spkB').addEventListener('click',e=>{
  e.stopPropagation();speak(V[order[idx]].word,e.currentTarget);
});
document.getElementById('nextBtn').addEventListener('click',()=>{
  idx=(idx+1)%V.length;renderCard();
});
document.getElementById('prevBtn').addEventListener('click',()=>{
  idx=(idx-1+V.length)%V.length;renderCard();
});
document.getElementById('shuffleBtn').addEventListener('click',()=>{
  for(let i=order.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];
  }
  idx=0;renderCard();
});
renderCard();

/* ===== Quiz ===== */
let qOrder=[],qIdx=0,score=0,answered=false;

function buildQuiz(){
  qOrder=V.map((_,i)=>i);
  for(let i=qOrder.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[qOrder[i],qOrder[j]]=[qOrder[j],qOrder[i]];
  }
  qIdx=0;score=0;
}

function renderQuiz(){
  answered=false;
  const fb=document.getElementById('fb');
  fb.textContent='';fb.className='fb';
  document.getElementById('qnext').style.display='none';
  document.getElementById('qspk').style.display='none';
  const it=V[qOrder[qIdx]];
  document.getElementById('qprog').textContent=`問題 ${qIdx+1} / ${V.length}`;
  document.getElementById('qmean').textContent=`意味: ${it.meaning}`;
  // 穴埋め表示（単語部分を___に）
  const blanked=it.ex.replace(new RegExp(it.word.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&'),'i'),
    '<span class="blank">_____</span>');
  document.getElementById('qsent').innerHTML=blanked;

  const others=V.map(v=>v.word).filter(w=>w!==it.word);
  for(let i=others.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[others[i],others[j]]=[others[j],others[i]];
  }
  const choices=[...others.slice(0,3),it.word];
  for(let i=choices.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[choices[i],choices[j]]=[choices[j],choices[i]];
  }
  const optsEl=document.getElementById('opts');
  optsEl.innerHTML='';
  choices.forEach(c=>{
    const b=document.createElement('button');
    b.className='obtn';b.textContent=c;
    b.addEventListener('click',()=>handleAns(b,c,it));
    optsEl.appendChild(b);
  });
}

function handleAns(btn,choice,it){
  if(answered)return;answered=true;
  document.querySelectorAll('.obtn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===it.word)b.classList.add('ok');
  });
  const ok=choice===it.word;
  if(ok)score++;
  else btn.classList.add('ng');
  const fb=document.getElementById('fb');
  fb.textContent=ok
    ?`✓ 正解！「${it.word}」= ${it.meaning}`
    :`✗ 不正解。正解は「${it.word}」= ${it.meaning}`;
  fb.className='fb '+(ok?'ok':'ng');
  // 答え合わせ後は完全な例文＋和訳を表示
  document.getElementById('qsent').innerHTML=
    `${it.ex}<div class="qtr">${it.tr}</div>`;
  const qs=document.getElementById('qspk');
  qs.style.display='inline-block';
  qs.onclick=()=>speak(it.word,qs);
  speak(it.word,qs);
  document.getElementById('qnext').style.display='block';
}

document.getElementById('qnext').addEventListener('click',()=>{
  qIdx++;
  if(qIdx>=V.length)showScore();
  else renderQuiz();
});

function showScore(){
  document.getElementById('qcard').style.display='none';
  document.getElementById('qnext').style.display='none';
  document.getElementById('scoreBox').style.display='block';
  document.getElementById('scoreNum').textContent=`${score} / ${V.length}`;
  const r=score/V.length;
  document.getElementById('scoreCmt').textContent=
    r===1?'満点！完璧です 🎉':r>=.8?'よくできました！':r>=.5?'もう一度復習しましょう。':'カード学習で再確認しましょう。';
}

document.getElementById('restartBtn').addEventListener('click',()=>{
  document.getElementById('qcard').style.display='block';
  document.getElementById('scoreBox').style.display='none';
  buildQuiz();renderQuiz();
});

buildQuiz();renderQuiz();

/* ===== Tabs ===== */
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.view+'View').classList.add('active');
  });
});
</script>
</body>
</html>
